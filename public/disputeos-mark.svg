<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DisputeOS mark</title>
  <desc id="desc">A cyan judgement shield forming a D with a balanced decision node inside.</desc>
